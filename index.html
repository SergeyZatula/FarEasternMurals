<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>OpenLayers — WB vector tiles</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ol@10.9.0/ol.css" />
  <style>
    html, body, #map {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #fdfdfc;
    }

    #map { position: fixed; inset: 0; }

    .panel {
      position: absolute;
      z-index: 10;
      left: 16px;
      top: 16px;
      max-width: 380px;
      padding: 14px 16px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.94);
      box-shadow: 0 12px 32px rgba(15, 23, 42, 0.16);
      backdrop-filter: blur(10px);
    }

    .panel h1 {
      margin: 0 0 6px;
      font-size: 16px;
      line-height: 1.25;
    }

    .panel p {
      margin: 0;
      color: #475569;
      font-size: 13px;
      line-height: 1.45;
    }

    .panel code {
      font-size: 12px;
      word-break: break-all;
    }

    .status {
      position: absolute;
      z-index: 20;
      left: 16px;
      bottom: 16px;
      max-width: min(760px, calc(100vw - 32px));
      padding: 10px 12px;
      border-radius: 12px;
      background: rgba(15, 23, 42, 0.86);
      color: #fff;
      font-size: 12px;
      line-height: 1.4;
      display: none;
      white-space: pre-wrap;
    }
	
    .status[data-visible="true"] { display: block; }
    .ol-control button { cursor: pointer; }
  </style>
</head>
<body>
  <div id="map" aria-label="Дальневосточные муралы"></div>

  <div id="status" class="status"></div>

  <script src="https://cdn.jsdelivr.net/npm/ol@10.9.0/dist/ol.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/ol-mapbox-style@13.4.1/dist/olms.js"></script>
  <script>
    const STYLE_URL = 'https://raw.githubusercontent.com/SergeyZatula/FarEasternMurals/refs/heads/main/basemap.json';

    const statusEl = document.getElementById('status');

    function showStatus(message) {
      statusEl.textContent = message;
      statusEl.dataset.visible = 'true';
    }

    async function loadStyle(url) {
      const response = await fetch(url, { cache: 'no-store' });
      if (!response.ok) {
        throw new Error(`Style request failed: ${response.status} ${response.statusText}`);
      }
      return response.json();
    }

    async function initMap() {
      try {
        const style = await loadStyle(STYLE_URL);

        // ol-mapbox-style применяет Mapbox Style JSON к OpenLayers-карте.
        const map = await olms.apply('map', style);
		
        map.addControl(new ol.control.FullScreen());
        map.addControl(
					  new ol.control.ScaleLine({
						units: 'metric',
						bar: false,
						steps: 1,
						text: false,
						minWidth: 50
					  })
					);>
		
        const view = map.getView();
        view.setMinZoom(2);
        view.setMaxZoom(20);
      } catch (error) {
        console.error(error);
        showStatus(
          'Карта не загрузилась. Проверьте консоль браузера.\n\n' +
          'Частые причины:\n' +
          '1) страница открыта как file:// — запустите локальный сервер;\n' +
          '2) недоступен style_wb.json или tilejson;\n' +
          '3) браузер блокирует запросы из-за CORS.\n\n' +
          'Команда запуска:\npython3 -m http.server 8080\n' +
          'Затем откройте: http://localhost:8080/\n\n' +
          'Ошибка: ' + (error && error.message ? error.message : error)
        );
      }
    }

    initMap();
  </script>
</body>
</html>
